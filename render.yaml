services:
  - type: worker
    name: morning-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: DB_PATH
        value: /data/bot_data.db
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
